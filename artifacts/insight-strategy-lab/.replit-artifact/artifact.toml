kind = "web"
previewPath = "/"
title = "Insight Strategy Lab"
version = "1.0.0"
id = "artifacts/insight-strategy-lab"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22971

[services.development]
run = "pnpm --filter @workspace/insight-strategy-lab run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/insight-strategy-lab", "run", "build" ]
publicDir = "artifacts/insight-strategy-lab/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22971"
BASE_PATH = "/"
